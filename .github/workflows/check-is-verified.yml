name: Check is_verified changes

on:
  pull_request:
    branches: [main, master]

jobs:
  check-is-verified:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          # Full history is required so the diff between base and head resolves.
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Run is_verified diff check
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 scripts/ci/check_is_verified.py
